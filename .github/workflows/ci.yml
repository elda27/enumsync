name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_call:
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '22'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        working-directory: axion_lab
        run: |
          uv sync --frozen --all-extras

      - name: Run linting
        working-directory: axion_lab
        run: |
          uv run ruff check src/

      - name: Run type checking
        working-directory: axion_lab
        run: |
          uv run ty check src/

      - name: Run tests
        working-directory: axion_lab
        run: |
          uv run pytest tests/ -v --cov=src
